<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Inventário Híbrido</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="menu-futurista">
    <div class="menu-logo">IH</div>
    <ul class="menu-links">
      <li><a href="index.html">Início</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="inventario.html">Inventário</a></li>
      <li><a href="relatorios.html">Relatórios</a></li>
    </ul>
    <div class="menu-hamburguer" onclick="toggleMenu()">☰</div>
  </nav>

  <header class="hero small-hero">
    <div class="hero-content">
      <h1 class="glow-title">Painel de Controle</h1>
      <p class="glow-subtitle">Monitoramento de ativos em tempo real</p>
    </div>
  </header>

  <section class="section">
    <div class="grid-3">
      <div class="card neon-card dash-card">
        <span class="dash-number">1.250</span>
        <p>Itens Total</p>
        <div class="progress-bar"><div class="progress-fill" style="width: 100%;"></div></div>
      </div>

      <div class="card neon-card dash-card">
        <span class="dash-number" style="color: #00ff00;">85%</span>
        <p>Concluído</p>
        <div class="progress-bar"><div class="progress-fill" style="width: 85%; background: #00ff00;"></div></div>
      </div>

      <div class="card neon-card dash-card">
        <span class="dash-number" style="color: #ffaa00;">150</span>
        <p>Pendências</p>
        <div class="progress-bar"><div class="progress-fill" style="width: 25%; background: #ffaa00;"></div></div>
      </div>
    </div>

    <div class="dashboard-charts">
      <div class="card neon-card chart-placeholder">
        <h3>Atividade por Setor</h3>
        <div class="simulated-chart">
            <div class="bar" style="height: 60%;"></div>
            <div class="bar" style="height: 85%;"></div>
            <div class="bar" style="height: 40%;"></div>
            <div class="bar" style="height: 95%;"></div>
        </div>
      </div>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
