<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Inventário Híbrido</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

  <div class="login-container">
    <div class="login-card">
      <div class="menu-logo" style="margin-bottom: 20px;">IH</div>
      <h2 class="login-title">Acesso ao Sistema</h2>
      
      <form id="loginForm">
        <input type="text" id="username" class="login-input" placeholder="Usuário" required>
        <input type="password" id="password" class="login-input" placeholder="Senha" required>
        
        <button type="submit" class="btn-neon login-btn">Entrar</button>
      </form>
      
      <p id="loginMessage" class="login-msg"></p>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    // Lógica simples de redirecionamento para teste
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const msg = document.getElementById('loginMessage');
      msg.style.color = "#00ff00";
      msg.textContent = "Acesso autorizado! Redirecionando...";
      
      setTimeout(() => {
        window.location.href = "index.html";
      }, 1500);
    });
  </script>
</body>
</html>
