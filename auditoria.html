<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auditoria - Inventário Híbrido</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="menu-futurista">
    <div class="menu-logo">IH</div>
    <ul class="menu-links">
      <li><a href="index.html">Início</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="auditoria.html">Auditoria</a></li>
      <li><a href="relatorios.html">Relatórios</a></li>
    </ul>
    <div class="menu-hamburguer" onclick="toggleMenu()">☰</div>
  </nav>

  <header class="hero small-hero">
    <div class="hero-content">
      <h1 class="glow-title">Módulo de Auditoria</h1>
      <p class="glow-subtitle">Validação de contagens e conferência de ativos</p>
    </div>
  </header>

  <section class="section">
    <div class="filtros-container">
      <input type="text" class="filtro-input" placeholder="ID do Ativo ou Local...">
      <select class="filtro-input">
        <option value="">Status de Auditoria</option>
        <option value="divergente">Divergente</option>
        <option value="confirmado">Confirmado</option>
      </select>
      <button class="btn-neon">Buscar</button>
    </div>

    <div style="overflow-x: auto;">
      <table class="report-table">
        <thead>
          <tr>
            <th>Ativo</th>
            <th>Qtd. Sistema</th>
            <th>Qtd. Coletada</th>
            <th>Diferença</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Notebook Dell G15</td>
            <td>15</td>
            <td>14</td>
            <td style="color: #ff4444; font-weight: bold;">-1</td>
            <td><button class="btn-neon" style="font-size: 12px; padding: 5px;">Recontar</button></td>
          </tr>
          <tr>
            <td>Monitor LG 29"</td>
            <td>20</td>
            <td>20</td>
            <td style="color: #00ff00;">0</td>
            <td><button class="btn-neon" style="font-size: 12px; padding: 5px;">Validar</button></td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
